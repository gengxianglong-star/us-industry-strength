name: Publish read-only dashboard

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "src/**"
      - "scripts/**"
      - "config.yaml"
      - "requirements.txt"
      - ".github/workflows/pages.yml"
  schedule:
    # Mon–Fri 06:30 Asia/Shanghai ≈ Sun–Thu 22:30 UTC
    - cron: "30 22 * * 0-4"
  workflow_dispatch:
    inputs:
      skip_precompute:
        description: Skip daily precompute (export + build only)
        type: boolean
        default: false

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/industry_strength.db
          key: dashboard-db-v1-${{ hashFiles('config.yaml') }}
          restore-keys: |
            dashboard-db-v1-

      - name: Load local data bundle (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_precompute == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view dashboard-data >/dev/null 2>&1; then
            gh release download dashboard-data --pattern 'dashboard-data.zip' --clobber
            mkdir -p frontend/public/data
            unzip -o dashboard-data.zip -d frontend/public/data
            echo "Loaded dashboard-data.zip from release"
          else
            echo "No dashboard-data release — will export from CI database"
          fi

      - name: Ensure breadth history
        if: github.event_name != 'workflow_dispatch' || inputs.skip_precompute != true
        run: python scripts/ensure_breadth_history.py
        continue-on-error: true

      - name: Run daily precompute
        if: github.event_name != 'workflow_dispatch' || inputs.skip_precompute != true
        run: python scripts/precompute_daily.py --sync-rs --force
        continue-on-error: true

      - name: Export static dashboard JSON
        if: github.event_name != 'workflow_dispatch' || inputs.skip_precompute != true
        run: python scripts/export_public_dashboard.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build read-only frontend
        working-directory: frontend
        env:
          VITE_READONLY: "1"
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci --no-audit --no-fund
          npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
