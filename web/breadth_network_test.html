<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Breadth · Network Test</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260601h" />
  <style>
    .net-test { max-width: 720px; margin: 1.5rem auto; padding: 0 1rem; }
    .net-test pre {
      background: #132238;
      border: 1px solid #2a3d5f;
      border-radius: 8px;
      padding: 0.75rem;
      overflow: auto;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .net-test .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .net-test .status { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a class="top-nav-item" href="/breadth">← Back to Breadth</a>
  </nav>
  <main class="net-test panel">
    <h1>Market Breadth · Network Test</h1>
    <p class="hint">Checks local API and Google Sheet download without opening raw JSON.</p>
    <div class="actions">
      <button type="button" id="pingBtn">1. Quick ping (~1s)</button>
      <button type="button" id="fetchBtn">2. Full fetch test (~5–15s)</button>
    </div>
    <p id="statusLine" class="status">Click a button to start.</p>
    <pre id="resultBox">Results appear here.</pre>
  </main>
  <script src="/static/shared.js?v=20260601h"></script>
  <script>
    const statusLine = document.getElementById("statusLine");
    const resultBox = document.getElementById("resultBox");
    const pingBtn = document.getElementById("pingBtn");
    const fetchBtn = document.getElementById("fetchBtn");

    function setBusy(busy, msg) {
      pingBtn.disabled = busy;
      fetchBtn.disabled = busy;
      if (msg) statusLine.textContent = msg;
    }

    async function run(url, label) {
      setBusy(true, `${label}…`);
      resultBox.textContent = "Request in progress…";
      try {
        const data = await fetchJson(url);
        resultBox.textContent = JSON.stringify(data, null, 2);
        statusLine.textContent = `${label}: OK`;
        showToast("Test passed");
      } catch (err) {
        resultBox.textContent = err.message || String(err);
        statusLine.textContent = `${label}: failed`;
        showToast(err.message || "Test failed", true);
      } finally {
        setBusy(false, "Click a button to retry.");
      }
    }

    pingBtn.addEventListener("click", () => {
      run("/api/breadth/ping", "Quick ping");
    });
    fetchBtn.addEventListener("click", () => {
      run("/api/breadth/fetch-test", "Full fetch");
    });
  </script>
</body>
</html>
